<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morris 语录集 · 100 条认知洞察</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0d;
  --surface: #181716;
  --surface2: #201f1d;
  --border: #2a2825;
  --text: #e6e2da;
  --text-dim: #8a867e;
  --text-muted: #5a5854;
  --gold: #c9a84c;
  --gold-dim: #7a6a30;
  --gold-bg: rgba(201,168,76,0.07);
  --accent1: #c94a4a;
  --accent2: #4a7fc9;
  --accent3: #4a9e6f;
  --accent4: #c97a4a;
  --accent5: #7a4ac9;
  --accent6: #c94a7a;
}
[data-theme="light"] {
  --bg: #f5f2ed;
  --surface: #ffffff;
  --surface2: #f0ece6;
  --border: #d9d2c8;
  --text: #2c2a28;
  --text-dim: #6b6560;
  --text-muted: #9a9490;
  --gold: #b8962e;
  --gold-dim: #a08028;
  --gold-bg: rgba(184,150,46,0.08);
  --accent1: #c0392b;
  --accent2: #2980b9;
  --accent3: #27ae60;
  --accent4: #d35400;
  --accent5: #8e44ad;
  --accent6: #c0396a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; transition: background 0.3s; }
body { transition: background 0.3s, color 0.3s; }
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}
.hero {
  min-height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
  padding: 100px 24px 50px; position: relative;
}
.hero::after {
  content: ''; position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 16px; border: 1px solid var(--gold-dim); border-radius: 100px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
  color: var(--gold); text-transform: uppercase; margin-bottom: 24px;
  animation: fadeSlide 1s ease 0.2s both;
}
.hero-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
.hero h1 {
  font-family: 'Noto Serif SC', serif; font-size: clamp(32px, 6vw, 56px); font-weight: 900;
  line-height: 1.2; letter-spacing: 0.02em; max-width: 720px;
  animation: fadeSlide 1s ease 0.4s both;
}
.hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--gold) 0%, #e8d5a3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero p { margin-top: 16px; font-size: 15px; color: var(--text-dim); max-width: 520px; font-weight: 300; letter-spacing: 0.04em; animation: fadeSlide 1s ease 0.6s both; }
.hero .stats { margin-top: 24px; display: flex; gap: 24px; font-size: 13px; color: var(--text-muted); animation: fadeSlide 1s ease 0.8s both; }
.hero .stats span { display: flex; align-items: center; gap: 6px; }
.hero .stats em { font-style: normal; color: var(--gold); font-weight: 600; }
.hero-divider { margin-top: 32px; width: 36px; height: 2px; background: var(--gold-dim); animation: fadeSlide 1s ease 1s both; }
@keyframes fadeSlide { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.controls {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,14,13,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border); padding: 12px 0;
}
.controls-inner { max-width: 960px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.controls .tab {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer;
  color: var(--text-dim); background: transparent; border: 1px solid var(--border);
  transition: all 0.25s; white-space: nowrap;
}
.controls .tab:hover { color: var(--text); border-color: var(--text-muted); }
.controls .tab.active { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-bg); }
.tab-all { composes: tab; color: var(--text-muted); }
.tab-all.active { color: var(--text); border-color: var(--text-muted); }
.controls-spacer { flex: 1; }
.btn-random {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); transition: all 0.25s; white-space: nowrap;
}
.btn-random:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-bg); }
.btn-theme {
  padding: 6px 12px; border-radius: 20px; font-size: 14px; cursor: pointer;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); transition: all 0.25s; line-height: 1;
}
.btn-theme:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-bg); }

.container { max-width: 880px; margin: 0 auto; padding: 40px 24px 60px; }

.cat-section { margin-bottom: 60px; display: none; }
.cat-section.active { display: block; }
.cat-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.cat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.cat-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; }
.cat-count { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 400; }
.cat-commentary { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 28px; }
.cat-commentary h4 { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.cat-commentary p { font-size: 14px; color: var(--text-dim); line-height: 1.8; }
.cat-commentary .pro-con { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
.cat-commentary .pro-con > div { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 10px; }
.cat-commentary .pro { background: rgba(74,158,111,0.08); border: 1px solid rgba(74,158,111,0.15); }
.cat-commentary .con { background: rgba(201,74,74,0.08); border: 1px solid rgba(201,74,74,0.15); }
.cat-commentary .pro-con .label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
.cat-commentary .pro .label { color: var(--accent3); }
.cat-commentary .con .label { color: var(--accent1); }
.cat-commentary .pro-con p { font-size: 13px; color: var(--text-dim); }

.quote { margin-bottom: 28px; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
.quote.visible { opacity: 1; transform: translateY(0); }
.quote-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px; transition: border-color 0.3s, box-shadow 0.3s; position: relative; }
.quote-inner:hover { border-color: rgba(201,168,76,0.15); box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
.quote-number { position: absolute; top: 16px; right: 20px; font-size: 11px; font-weight: 600; color: var(--text-muted); font-feature-settings: "tnum"; }
.quote-content { font-family: 'Noto Serif SC', serif; font-size: 15px; line-height: 1.9; color: var(--text); padding-right: 40px; }
.quote-note {
  margin-top: 14px; padding: 14px 18px; border-radius: 10px;
  background: rgba(201,168,76,0.04); border: 1px solid rgba(201,168,76,0.1);
  font-size: 13px; line-height: 1.7; color: var(--text-dim);
}
.quote-note .note-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.quote-knowledge {
  margin-top: 12px; padding: 14px 18px; border-radius: 10px;
  background: rgba(74,127,201,0.04); border: 1px solid rgba(74,127,201,0.1);
  font-size: 13px; line-height: 1.8; color: var(--text-dim);
}
.quote-knowledge .knowledge-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent2); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.quote-knowledge a { color: var(--accent2); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
.quote-knowledge a:hover { border-color: var(--accent2); }
.quote-knowledge .kb-section { margin-top: 8px; }
.quote-knowledge .kb-section:first-child { margin-top: 0; }
.quote-knowledge .kb-tag { display: inline-block; font-size: 10px; padding: 1px 8px; border-radius: 4px; background: rgba(74,127,201,0.1); color: var(--accent2); margin-right: 6px; font-weight: 500; }
.quote-meta { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.quote-stars { font-size: 12px; letter-spacing: 1px; color: var(--gold-dim); }
.quote-stars .filled { color: var(--gold); }
.quote-tag { font-size: 10px; padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border); color: var(--text-muted); font-weight: 500; }
.quote-related {
  margin-top: 12px; padding: 12px 16px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; line-height: 1.7;
}
.quote-related .rl-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
.quote-related .rl-item {
  display: inline-block; padding: 2px 10px; margin: 2px 4px 2px 0;
  border-radius: 6px; background: var(--gold-bg); border: 1px solid var(--gold-dim);
  color: var(--gold); cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.quote-related .rl-item:hover { background: var(--gold-dim); color: #fff; }
.btn-share {
  font-size: 10px; padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border);
  color: var(--text-muted); background: transparent; cursor: pointer; font-weight: 500; transition: all 0.2s; margin-left: auto;
}
.btn-share:hover { color: var(--accent2); border-color: var(--accent2); }
@keyframes highlightFlash {
  0% { background: var(--gold-bg); border-color: var(--gold); }
  100% { background: var(--surface); border-color: var(--border); }
}
.quote-inner.flash { animation: highlightFlash 2s ease; }

.footer { text-align: center; padding: 40px 24px 60px; border-top: 1px solid var(--border); max-width: 880px; margin: 0 auto; }
.footer p { font-size: 13px; color: var(--text-muted); }
.footer a { color: var(--gold); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.btn-export {
  display: inline-block; margin-top: 16px; padding: 8px 18px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.btn-export:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-bg); }

.modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; padding: 24px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; max-width: 640px; width: 100%; animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.modal-box .quote-content { font-size: 17px; }
.modal-box .quote-note { margin-top: 16px; }
.modal-close { margin-top: 24px; padding: 8px 20px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.modal-close:hover { color: var(--text); border-color: var(--text-muted); }
.share-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; padding: 24px; }
.share-modal.show { display: flex; }
.share-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; max-width: 520px; width: 100%; animation: modalIn 0.3s ease; }
.share-box .share-preview {
  background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; margin-bottom: 20px;
  font-family: 'Noto Serif SC', serif; font-size: 15px; line-height: 1.9; color: var(--text);
  min-height: 200px; display: flex; flex-direction: column; justify-content: center;
}
.share-box .share-preview .sp-num { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.share-box .share-preview .sp-text { flex: 1; }
.share-box .share-preview .sp-meta { margin-top: 16px; font-size: 11px; color: var(--text-muted); font-family: 'Noto Sans SC', sans-serif; }
.share-box .share-actions { display: flex; gap: 10px; }
.share-box .share-actions button {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.share-box .share-actions button:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-bg); }
.share-box .share-close {
  display: block; margin-top: 12px; width: 100%; padding: 8px; border-radius: 10px;
  border: none; background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer;
}
.share-box .share-close:hover { color: var(--text-dim); }
.share-canvas-wrap { display: none; } /* hidden canvas container for image generation */

.scroll-top { position: fixed; bottom: 30px; right: 30px; z-index: 50; width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-size: 18px; cursor: pointer; display: none; align-items: center; justify-content: center; transition: all 0.25s; }
.scroll-top:hover { color: var(--gold); border-color: var(--gold-dim); }

@media (max-width: 640px) {
  .hero { min-height: 40vh; padding: 80px 20px 40px; }
  .controls-inner { gap: 6px; }
  .controls .tab { font-size: 11px; padding: 5px 10px; }
  .quote-inner { padding: 18px 20px; }
  .quote-content { font-size: 14px; padding-right: 30px; }
  .quote-note { font-size: 12px; padding: 12px 14px; }
  .cat-commentary { padding: 16px 18px; }
  .cat-commentary .pro-con { flex-direction: column; }
  .modal-box { padding: 24px 20px; }
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-badge">X · @Morris_LT</div>
  <h1>Morris <em>语录集</em></h1>
  <p>100 条关于认知、人性、成长与生命的深度洞察<br>精选自 X 平台 @Morris_LT · 每附科学短评</p>
  <div class="stats">
    <span><em>100</em> 条语录</span>
    <span><em>9</em> 大分类</span>
    <span>原文完整呈现 · 附智慧点评</span>
  </div>
  <div class="hero-divider"></div>
</section>

<nav class="controls" id="controls">
  <div class="controls-inner">
    <button class="tab tab-all active" data-cat="all">全部</button>
    <div id="tabContainer"></div>
    <span class="controls-spacer"></span>
    <button class="btn-random" id="btnRandom">🎲 随机一句</button>
    <button class="btn-theme" id="btnTheme" title="切换日间/夜间模式">🌙</button>
  </div>
</nav>

<div class="container" id="content"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="share-modal" id="shareModal">
  <div class="share-box" id="shareBox">
    <div class="share-preview" id="sharePreview">
      <div class="sp-num" id="spNum"></div>
      <div class="sp-text" id="spText"></div>
      <div class="sp-meta" id="spMeta"></div>
    </div>
    <div class="share-actions">
      <button id="shareCopy">📋 复制文字</button>
      <button id="shareImage">🖼️ 保存图片</button>
    </div>
    <button class="share-close" onclick="document.getElementById('shareModal').classList.remove('show')">取消</button>
  </div>
</div>
<div class="share-canvas-wrap" id="shareCanvasWrap"></div>

<div class="footer">
  <p>内容源自 X 平台 <a href="https://x.com/Morris_LT" target="_blank">@Morris_LT</a> · 分类整理与可视化</p>
  <button class="btn-export" id="btnExport">📥 导出 Markdown</button>
</div>

<button class="scroll-top" id="scrollTop">↑</button>

<script>
// ====== 分类元数据 ======
const categories = [
  { id: 'cognition', name: '认知升级', icon: '🧠', color: '#4a7fc9',
    commentary: 'Morris 最核心的主题之一。他将"认知"从抽象概念落地为具体行动——换行业、去新城市、持续学习，强调认知是动态修正而非静态积累。对"高认知穷人"的驳斥尤为精彩：真正认知的本质是获得更多选择权，而非痛苦或贫穷。',
    pro: '强调认知的实践性和动态性，反对将认知标签化，具有现实指导意义',
    con: '部分表述偏绝对（如"认知终止是最大的悲哀"），忽略了社会结构对认知形成的限制' },
  { id: 'psychology', name: '心理洞察', icon: '🔍', color: '#c94a7a',
    commentary: '对心理操控、内耗和情绪机制有系统性的总结。10 种操控模式具备实操参考价值，"价值感外包"定义内耗精准有力。情绪相关段落（"情绪是浪，意识是海"）文学性强且符合认知行为疗法的核心理念。',
    pro: '将复杂心理学概念转化为通俗语言，心理操控的归纳系统实用',
    con: '部分内容过度简化（如将抑郁部分归因于身体），临床复杂性被轻描淡写' },
  { id: 'growth', name: '自我成长', icon: '🌱', color: '#4a9e6f',
    commentary: '最具实践价值的部分。"长期主义不是笔直向上的曲线"刷新了对坚持的理解——不是完美执行而是跌倒后重新上路，符合行为心理学中的习惯恢复研究。"先使用再拥有"则与"做中学"（learning by doing）的教育理念一致。',
    pro: '对长期主义和行动力的诠释实用且降低心理门槛，符合认知行为理论',
    con: '过度强调个人意志，对系统性障碍（经济、家庭背景等）着墨较少' },
  { id: 'society', name: '人性与社会', icon: '🏛️', color: '#c97a4a',
    commentary: '社会观察犀利尖锐。"复杂性即权力""制造流程即抢劫""反对卷也反对躺平"的批判直指结构性矛盾。这些内容带有鲜明的时代观察者视角，锐度本身就是价值，但结论常偏绝对。',
    pro: '对权力结构和制度文化的观察入木三分，社会批判视角独特',
    con: '部分论断过于绝对，情绪化表达多于严谨分析，忽略了多元性和复杂性' },
  { id: 'relationships', name: '关系智慧', icon: '🤝', color: '#c94a4a',
    commentary: '核心观点：边界决定尊重，结构保障信任。不过度依赖人品维系关系，而是强调"让人倾向于靠谱的关系结构"——这与博弈论中的重复博弈理论高度一致。观点理性务实，是关系建议中难得的不说教派。',
    pro: '用理性框架分析人际关系，可操作性强，不依赖道德说教',
    con: '过于理性化的模型可能忽略了无条件的善意、情感联结等非理性维度' },
  { id: 'self', name: '自我与主体性', icon: '💎', color: '#7a4ac9',

  { id: 1, stars: 5, cat: 'cognition',
